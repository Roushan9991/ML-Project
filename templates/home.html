<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Prediction Form</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a, #1e293b, #334155);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: rgba(255, 255, 255, 0.08);
            padding: 40px;
            border-radius: 25px;
            backdrop-filter: blur(12px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            color: white;
        }

        .title {
            text-align: center;
            margin-bottom: 35px;
        }

        .title h1 {
            font-size: 42px;
            color: #38bdf8;
            margin-bottom: 10px;
        }

        .title p {
            color: #cbd5e1;
        }

        form {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
        }

        .input-group label {
            margin-bottom: 10px;
            font-weight: 500;
        }

        .input-group input,
        .input-group select {
            padding: 14px;
            border: none;
            outline: none;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.12);
            color: white;
            font-size: 15px;
        }

        .input-group input::placeholder {
            color: #cbd5e1;
        }

        select option {
            color: black;
        }

        .full-width {
            grid-column: 1 / -1;
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 14px;
            background: #38bdf8;
            color: #0f172a;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .submit-btn:hover {
            background: #0ea5e9;
            transform: translateY(-3px);
        }

        .result-box {
            margin-top: 30px;
            text-align: center;
            padding: 20px;
            border-radius: 16px;
            background: rgba(56, 189, 248, 0.15);
        }

        .result-box h2 {
            color: #38bdf8;
        }

        @media(max-width:768px) {
            .container {
                padding: 25px;
            }

            .title h1 {
                font-size: 32px;
            }
        }
    </style>
</head>

<body>

    <div class="container">

        <div class="title">
            <h1>Student Performance Prediction</h1>
            <p>Fill the details below to predict the Math Score</p>
        </div>

        <form action="predict" method="POST">

            <!-- Gender -->
            <div class="input-group">
                <label>Gender</label>
                <select name="gender" required>
                    <option selected disabled>Select Gender</option>
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                </select>
            </div>

            <!-- Race Ethnicity -->
            <div class="input-group">
                <label>Race / Ethnicity</label>
                <select name="race_ethnicity" required>
                    <option selected disabled>Select Group</option>
                    <option value="group A">Group A</option>
                    <option value="group B">Group B</option>
                    <option value="group C">Group C</option>
                    <option value="group D">Group D</option>
                    <option value="group E">Group E</option>
                </select>
            </div>

            <!-- Parental Education -->
            <div class="input-group">
                <label>Parental Level of Education</label>
                <select name="parental_level_of_education" required>
                    <option selected disabled>Select Education</option>
                    <option value="some high school">Some High School</option>
                    <option value="high school">High School</option>
                    <option value="some college">Some College</option>
                    <option value="associate's degree">Associate's Degree</option>
                    <option value="bachelor's degree">Bachelor's Degree</option>
                    <option value="master's degree">Master's Degree</option>
                </select>
            </div>

            <!-- Lunch -->
            <div class="input-group">
                <label>Lunch Type</label>
                <select name="lunch" required>
                    <option selected disabled>Select Lunch Type</option>
                    <option value="standard">Standard</option>
                    <option value="free/reduced">Free/Reduced</option>
                </select>
            </div>

            <!-- Test Preparation -->
            <div class="input-group">
                <label>Test Preparation Course</label>
                <select name="test_preparation_course" required>
                    <option selected disabled>Select Option</option>
                    <option value="none">None</option>
                    <option value="completed">Completed</option>
                </select>
            </div>

            <!-- Reading Score -->
            <div class="input-group">
                <label>Reading Score</label>
                <input type="number" name="reading_score" placeholder="Enter Reading Score" required>
            </div>

            <!-- Writing Score -->
            <div class="input-group">
                <label>Writing Score</label>
                <input type="number" name="writing_score" placeholder="Enter Writing Score" required>
            </div>

            <!-- Submit Button -->
            <div class="full-width">
                <button type="submit" class="submit-btn">
                    Predict Math Score
                </button>
            </div>

        </form>

        {% if results %}
        <div class="result-box">
            <h2>Predicted Math Score: {{ results }}</h2>
        </div>
        {% endif %}

    </div>

</body>

</html>
